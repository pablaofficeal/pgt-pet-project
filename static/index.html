<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PGT Blog Lab</title>
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">PGT Blog Lab</a>
        <nav class="nav-links" aria-label="Primary">
            <a href="/auth/login">Login</a>
            <a href="/auth/register">Register</a>
            <a href="/api/v1/docs">API docs</a>
        </nav>
    </header>

    <main>
        <section class="intro" aria-labelledby="page-title">
            <div>
                <p class="eyebrow">JSON posts, SQLite comments</p>
                <h1 id="page-title">A small blog running on PGT</h1>
            </div>
            <p id="status" class="status" role="status">Loading live feed...</p>
        </section>

        <section class="feed-shell" aria-labelledby="feed-title">
            <div class="section-heading">
                <h2 id="feed-title">Latest Posts</h2>
                <p id="identity" class="identity">Guest reader</p>
            </div>
            <div id="posts-grid" class="posts-grid"></div>
        </section>
    </main>

    <script src="/static/js/index.js"></script>
</body>
</html>
