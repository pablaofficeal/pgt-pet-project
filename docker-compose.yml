services:
  app:
    build:
      context: .
      args:
        PGT_IMAGE: pablaofficeal/pgt-language:latest
    expose:
      - "5000"
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
